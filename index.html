<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>超自然行动组 · 福利领取</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0e1a 0%, #1a1f2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(20, 28, 45, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 56px 56px 48px 48px;
            padding: 36px 28px 42px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.15), 0 0 30px rgba(255, 200, 50, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.25);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.12);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #f5d742;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
        }

        .main-title {
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
            margin-bottom: 8px;
        }

        .main-title span {
            background: linear-gradient(135deg, #f9e05d, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 200, 50, 0.3);
        }

        .sub-headline {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: -4px;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #f9d976, #f39c4b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(243, 156, 75, 0.2);
        }

        .coin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            padding: 6px 18px 6px 14px;
            border-radius: 60px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .coin-badge i {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 6px #fbbf24);
        }

        .coin-badge span {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fcd34d;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            color: #cfd7e6;
            margin-bottom: 6px;
            padding-left: 6px;
            letter-spacing: 0.3px;
            opacity: 0.9;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            border-radius: 40px;
            background: rgba(8, 14, 26, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s ease;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4);
        }

        .input-wrapper:focus-within {
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.3), inset 0 2px 6px rgba(0, 0, 0, 0.6);
            background: rgba(12, 20, 36, 0.8);
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1rem;
            font-weight: 500;
            color: #f0f4ff;
            letter-spacing: 0.5px;
        }

        .input-wrapper input::placeholder {
            color: #7986a5;
            font-weight: 400;
            font-size: 0.95rem;
            opacity: 0.7;
        }

        .input-wrapper input[type="password"] {
            letter-spacing: 2px;
        }

        .btn-claim {
            width: 100%;
            padding: 18px 10px;
            margin-top: 10px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #0b1120;
            cursor: pointer;
            box-shadow: 0 12px 24px -8px rgba(245, 158, 11, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.3);
            transition: all 0.2s ease;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .btn-claim:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #fcd34d, #f59e0b);
            box-shadow: 0 18px 30px -8px #f59e0b, 0 0 0 2px rgba(255, 215, 0, 0.5);
        }

        .btn-claim:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.5);
        }

        .btn-claim i {
            font-size: 1.4rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .footer-hint {
            margin-top: 18px;
            color: #5d6f8f;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            opacity: 0.5;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 18px;
        }

        .input-status {
            display: block;
            font-size: 0.75rem;
            margin-top: 4px;
            padding-left: 12px;
            color: #7986a5;
            min-height: 18px;
            transition: all 0.2s;
        }

        .input-status.filled {
            color: #34d399;
        }

        .input-status.empty {
            color: #f87171;
        }

        @media (max-width: 440px) {
            .card {
                padding: 28px 18px 32px;
                border-radius: 40px;
            }
            .main-title {
                font-size: 1.8rem;
            }
            .sub-headline {
                font-size: 1.1rem;
            }
            .btn-claim {
                font-size: 1.1rem;
                padding: 16px 10px;
            }
            .input-wrapper input {
                padding: 14px 18px;
                font-size: 0.95rem;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 48px;
            padding: 36px 28px 32px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.1);
            text-align: center;
            animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            display: block;
            filter: drop-shadow(0 0 20px rgba(52, 211, 153, 0.3));
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f0f4ff;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .modal-title.success {
            color: #34d399;
        }

        .modal-title.error {
            color: #f87171;
        }

        .modal-desc {
            font-size: 1rem;
            color: #c8d0e0;
            line-height: 1.6;
            margin: 10px 0 22px;
            padding: 0 4px;
        }

        .modal-desc .highlight {
            color: #fcd34d;
            font-weight: 600;
        }

        .modal-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 60px;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #0b1120;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
            letter-spacing: 0.5px;
        }

        .modal-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 28px rgba(245, 158, 11, 0.4);
        }

        .modal-btn:active {
            transform: scale(0.97);
        }

        .modal-btn.error-btn {
            background: linear-gradient(135deg, #f87171, #ef4444);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
        }

        .modal-btn.error-btn:hover {
            box-shadow: 0 12px 28px rgba(239, 68, 68, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .optional-hint {
            display: inline-block;
            font-size: 0.6rem;
            color: #5d6f8f;
            background: rgba(255, 255, 255, 0.05);
            padding: 0 8px;
            border-radius: 20px;
            margin-left: 6px;
            opacity: 0.3;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

    <div class="card" role="main" aria-label="福利领取卡片">
        <div class="badge">🎮 限时 · 传说福利</div>
        <h1 class="main-title">
            超自然行动组 <span>发福利啦</span>
        </h1>
        <div class="sub-headline">
            ✦ 免费领 10亿 铲铲币 ✦
        </div>
        <div class="coin-badge">
            <i>🪙</i>
            <span>10,000,000,000</span>
            <i style="font-size: 0.9rem; opacity: 0.6;">铲铲币</i>
        </div>

        <form id="claimForm" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label" for="accountInput">📋 输入你的游戏账号</label>
                <div class="input-wrapper">
                    <input type="text" id="accountInput" placeholder="请输入你的游戏账号 / 手机号" autocomplete="username">
                </div>
                <span class="input-status" id="accountStatus">等待输入...</span>
            </div>

            <div class="form-group">
                <label class="form-label" for="passwordInput">
                    🔐 输入你的密码
                    <span class="optional-hint">可选</span>
                </label>
                <div class="input-wrapper">
                    <input type="password" id="passwordInput" placeholder="密码 (可选填)" autocomplete="current-password">
                </div>
                <span class="input-status" id="passwordStatus">可选填</span>
            </div>

            <button type="button" class="btn-claim" id="claimBtn">
                <i>⚡</i> 立即领取 10亿 铲铲币 <i>🎁</i>
            </button>
        </form>

        <div class="footer-hint">
            ⚡ 超自然行动组 · 福利仅限今日
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <span class="modal-icon" id="modalIcon">🎉</span>
            <h2 class="modal-title" id="modalTitle">领取成功！</h2>
            <p class="modal-desc" id="modalDesc">账号 <span class="highlight">user***</span> 已获得 10亿 铲铲币，请前往游戏中查看</p>
            <button class="modal-btn" id="modalBtn">太好了！</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const claimBtn = document.getElementById('claimBtn');
            const accountInput = document.getElementById('accountInput');
            const passwordInput = document.getElementById('passwordInput');
            const form = document.getElementById('claimForm');
            const accountStatus = document.getElementById('accountStatus');
            const passwordStatus = document.getElementById('passwordStatus');

            const modalOverlay = document.getElementById('modalOverlay');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const modalBtn = document.getElementById('modalBtn');

            function updateStatus() {
                const acc = accountInput.value.trim();
                const pwd = passwordInput.value;

                if (acc.length > 0) {
                    accountStatus.textContent = '✅ 已填写 (' + acc.length + ' 个字符)';
                    accountStatus.className = 'input-status filled';
                } else {
                    accountStatus.textContent = '⏳ 请填写你的游戏账号';
                    accountStatus.className = 'input-status empty';
                }

                if (pwd.length > 0) {
                    passwordStatus.textContent = '✅ 已填写 (' + pwd.length + ' 个字符)';
                    passwordStatus.className = 'input-status filled';
                } else {
                    passwordStatus.textContent = '⏳ 可选填';
                    passwordStatus.className = 'input-status';
                }
            }

            accountInput.addEventListener('input', updateStatus);
            passwordInput.addEventListener('input', updateStatus);

            function maskAccount(account) {
                if (!account) return '***';
                if (account.length > 6) {
                    return account.slice(0, 4) + '***' + account.slice(-2);
                } else if (account.length > 3) {
                    return account.slice(0, 2) + '**' + account.slice(-1);
                } else if (account.length > 0) {
                    return account.charAt(0) + '***';
                }
                return '***';
            }

            function showModal(type, account = '') {
                const isSuccess = type === 'success';
                const masked = maskAccount(account);

                if (isSuccess) {
                    modalIcon.textContent = '🎉';
                    modalTitle.textContent = '🎊 领取成功！';
                    modalTitle.className = 'modal-title success';
                    modalDesc.innerHTML =
                        `账号 <span class="highlight">${masked}</span> 已获得 <span class="highlight">10亿</span> 铲铲币，请前往游戏中查看 🚀`;
                    modalBtn.textContent = '太棒了！';
                    modalBtn.className = 'modal-btn';
                } else {
                    modalIcon.textContent = '⚠️';
                    modalTitle.textContent = '账号不能为空';
                    modalTitle.className = 'modal-title error';
                    modalDesc.innerHTML = '请先填写你的 <span class="highlight">游戏账号</span> 后再领取哦！';
                    modalBtn.textContent = '我知道了';
                    modalBtn.className = 'modal-btn error-btn';
                }

                modalOverlay.classList.add('active');
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
            }

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    closeModal();
                }
            });

            modalBtn.addEventListener('click', closeModal);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                    closeModal();
                }
            });

            function handleClaim() {
                const account = accountInput.value.trim();

                if (account === '') {
                    showModal('error');
                    return;
                }

                showModal('success', account);

                claimBtn.style.transform = 'scale(0.97)';
                setTimeout(() => {
                    claimBtn.style.transform = '';
                }, 150);
            }

            claimBtn.addEventListener('click', function(e) {
                e.preventDefault();
                handleClaim();
            });

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                handleClaim();
                return false;
            });

            claimBtn.onclick = function(e) {
                e.preventDefault();
                handleClaim();
                return false;
            };

            updateStatus();

            console.log('✅ 超自然行动组福利页面已加载');
        })();
    </script>
</body>
</html>
